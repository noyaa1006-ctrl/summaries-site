<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>מתמטיקה - סיכומים של נויה</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-hover: #334155;
      --text: #ffffff;
      --primary: #2563eb;
      --muted: rgba(255,255,255,0.75);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: var(--bg);
      color: var(--text);
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #111827;
      padding: 15px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 10px;
      transition: 0.3s;
    }

    nav a:hover {
      background: var(--primary);
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 70px 20px 30px;
    }

    header h1 {
      font-size: 42px;
      margin: 0;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: linear-gradient(145deg, #1e293b, #111827);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      font-size: 17px;
      font-weight: bold;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: var(--card-hover);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="index.html">בית</a>
    <a href="math.html">מתמטיקה</a>
    <a href="physics.html">פיזיקה</a>
    <a href="tips.html">טיפים</a>
    <a href="faq.html">שאלות</a>
    <a href="about.html">על עצמי</a>
  </nav>

  <!-- HEADER -->
  <header>
    <h1>📘 מתמטיקה</h1>
    <p>כל הסיכומים, הנוסחאות והתרגולים במקום אחד</p>
  </header>

  <!-- CONTENT -->
  <div class="grid">

    <div class="card">📊 אלגברה</div>
    <div class="card">📐 גיאומטריה</div>
    <div class="card">📈 פונקציות</div>
    <div class="card">🧮 חשבון דיפרנציאלי</div>
    <div class="card">📚 תרגילים פתורים</div>
    <div class="card">🧠 מבחני תרגול</div>

  </div>

  <!-- FOOTER -->
  <footer>
    נבנה באהבה ❤️ אתר סיכומים אישי
  </footer>

</body>
</html>
